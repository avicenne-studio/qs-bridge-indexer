name: Deploy Indexer

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  build-push:
    if: ${{ github.ref_name == 'main' }}
    runs-on: ubuntu-latest
    outputs:
      workspace: ${{ steps.env.outputs.workspace }}

    steps:
      - uses: actions/checkout@v4

      - name: Resolve workspace
        id: env
        run: |
          BRANCH=${{ github.ref_name }}
          if [[ "$BRANCH" == "main" ]]; then
            echo "workspace=development" >> $GITHUB_OUTPUT

          else
            echo "Unsupported branch: $BRANCH" >&2
            exit 1
          fi

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ secrets.REGISTRY }} --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ secrets.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/${{ steps.env.outputs.workspace }}/indexer:${{ github.sha }}
            ${{ secrets.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/${{ steps.env.outputs.workspace }}/indexer:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  trigger-deploy:
    needs: build-push
    runs-on: ubuntu-latest

    steps:
      - name: Dispatch deploy to infrastructure repo
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.INFRA_GITHUB_PAT }}
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: 'avicenne-studio',
              repo: 'qs-bridge-infrastructure',
              event_type: 'indexer-deploy',
              client_payload: {
                workspace: '${{ needs.build-push.outputs.workspace }}'
              }
            });
